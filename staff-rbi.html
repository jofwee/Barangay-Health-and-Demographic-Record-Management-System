        <main class="rbi-content">
            <header class="rbi-header">
                <img src="86ERS%20LOGO.png" alt="Barangay 86ers logo">
                <div>
                    <h1>Barangay Health and Demographic Record Management System</h1>
                </div>
            </header>

            <section class="rbi-section">
                <h2 class="rbi-title">RBI FORM</h2>

                <div class="rbi-card">
                    <form class="rbi-form" action="#" method="post">
                        <div class="rbi-row">
                            <div class="rbi-field">
                                <label for="rbi-surname">Surname:</label>
                                <input id="rbi-surname" type="text" placeholder="Type...">
                            </div>
                            <div class="rbi-field rbi-field--small">
                                <label for="rbi-suffix">Suffix:</label>
                                <input id="rbi-suffix" type="text" placeholder="Type...">
                            </div>
                        </div>

                        <div class="rbi-row">
                            <div class="rbi-field">
                                <label for="rbi-firstname">First Name:</label>
                                <input id="rbi-firstname" type="text" placeholder="Type...">
                            </div>
                            <div class="rbi-field rbi-field--small">
                                <label for="rbi-age">Age:</label>
                                <input id="rbi-age" type="number" placeholder="Type...">
                            </div>
                        </div>

                        <div class="rbi-row">
                            <div class="rbi-field">
                                <label for="rbi-middlename">Middle Name:</label>
                                <input id="rbi-middlename" type="text" placeholder="Type...">
                            </div>
                            <div class="rbi-field rbi-field--small">
                                <label for="rbi-sex">Sex:</label>
                                <select id="rbi-sex" required>
                                    <option value="" disabled selected>Select...</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>
                        </div>

                        <div class="rbi-field rbi-field--full">
                            <label for="rbi-address">Address:</label>
                            <input id="rbi-address" type="text" placeholder="Type...">
                        </div>

                        <div class="rbi-field rbi-field--half">
                            <label for="rbi-contact">Contact No.</label>
                            <input id="rbi-contact" type="text" placeholder="Type...">
                        </div>

                        <div class="rbi-actions">
                            <button class="submit-btn" type="submit">Submit</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="rbi-logic.js"></script>
