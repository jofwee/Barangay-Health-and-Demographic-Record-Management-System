            <button class="logout-btn">
                <span class="logout-btn__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 6V4a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2h-6a2 2 0 0 1-2-2v-2" />

        <main class="inventory-content">
            <header class="inventory-header">
                <img src="86ERS%20LOGO.png" alt="Barangay 86ers logo">
                <div>
                    <h1>Barangay Health and Demographic Record Management System</h1>
                </div>
                <button class="user-pill" aria-label="User menu">
                    <span>JD</span>
                </button>
            </header>

            <section class="inventory-section" aria-labelledby="inventory-title">
                <div class="inventory-title-row">
                    <h2 id="inventory-title">Medicine Inventory</h2>
                </div>
                <div class="inventory-controls">
                    <div class="inventory-search">
                        <svg class="inventory-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="11" cy="11" r="7" />
                            <path d="M16.5 16.5L21 21" />
                        </svg>
                        <input type="search" placeholder="Search by name or category" aria-label="Search medicine inventory">
                    </div>
                    <button class="add-med-btn" type="button" onclick="openAddMedicineModal()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 5v14" />
                            <path d="M5 12h14" />
                        </svg>
                        <span>Add New Medicine</span>
                    </button>
                </div>
                <div class="inventory-filters" role="group" aria-label="Stock filters">
                    <button class="filter-pill is-active" type="button">All</button>
                    <button class="filter-pill" type="button">Low Stock</button>
                    <button class="filter-pill" type="button">In Stock</button>
                    <button class="filter-pill" type="button">Out of Stock</button>
                </div>
                <div class="inventory-table-card">
                    <div class="table-scroll">
                        <table class="inventory-table" aria-label="Medicine inventory list">
                            <thead>
                                <tr>
                                    <th scope="col">Name</th>
                                    <th scope="col">Category</th>
                                    <th scope="col">Qty.</th>
                                    <th scope="col">Unit</th>
                                    <th scope="col">Expiration Date</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="medicineModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h2 id="medicineModalTitle">Add New Medicine</h2>
            <form id="medicineForm" class="auth-form" style="text-align: left;">
                <input type="hidden" id="med-doc-id">
                
                <label class="modal-label" for="med-name">Medicine Name</label>
                <input type="text" id="med-name" class="modal-select" required>

                <label class="modal-label" for="med-category">Category</label>
                <input type="text" id="med-category" class="modal-select" placeholder="e.g. Analgesic, Antibiotic" required>

                <div style="display: flex; gap: 1rem; margin-bottom: 0.5rem;">
                    <div style="flex:1;">
                        <label class="modal-label" for="med-qty">Quantity</label>
                        <input type="number" id="med-qty" class="modal-select" required min="0">
                    </div>
                    <div style="flex:1;">
                        <label class="modal-label" for="med-unit">Unit</label>
                        <input type="text" id="med-unit" class="modal-select" placeholder="e.g. Tablet, Syrup" required>
                    </div>
                </div>

                <label class="modal-label" for="med-exp">Expiration Date</label>
                <input type="date" id="med-exp" class="modal-select" required>

                <div class="modal-actions" style="margin-top: 1rem;">
                    <button type="submit" class="btn btn--approve" id="saveMedBtn">Save Medicine</button>
                    <button type="button" class="btn btn--cancel" onclick="closeMedicineModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth-guard.js"></script>

    <script src="inventory-logic.js"></script>
</body>
</html>
