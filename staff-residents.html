            <button class="logout-btn">
                <span class="logout-btn__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 6V4a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2h-6a2 2 0 0 1-2-2v-2" />

        <main class="inventory-content">
            <header class="inventory-header">
                <img src="86ERS%20LOGO.png" alt="Barangay 86ers logo">
                <div>
                    <h1>Barangay Health and Demographic Record Management System</h1>
                </div>
                <button class="user-pill" aria-label="User menu">
                    <span>JD</span>
                </button>
            </header>

            <section class="inventory-section">
                <div class="inventory-title-row">
                    <h2>Resident Management</h2>
                </div>

                <div class="inventory-controls">
                    <div class="inventory-search">
                        <svg class="inventory-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="7" />
                            <path d="M21 21l-4.35-4.35" />
                        </svg>
                        <input type="text" placeholder="Search by name or Health ID">
                        <button class="search-submit" aria-label="Search">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="7" />
                                <path d="M21 21l-4.35-4.35" />
                            </svg>
                        </button>
                    </div>
                    <button class="add-med-btn" onclick="window.location.href='staff-rbi.html'">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 5v14" />
                            <path d="M5 12h14" />
                        </svg>
                        Add New Resident
                    </button>
                </div>

                <div class="inventory-filters">
                    <button class="filter-pill is-active">All</button>
                    <button class="filter-pill">Infant</button>
                    <button class="filter-pill">Kids</button>
                    <button class="filter-pill">Teenagers</button>
                    <button class="filter-pill">Adults</button>
                    <button class="filter-pill">Senior Citizens</button>
                    <button class="filter-pill">PWDs</button>
                </div>

                <div class="inventory-table-card">
                    <div class="table-scroll">
                        <table class="inventory-table">
                            <thead>
                                <tr>
                                    <th>Health ID</th>
                                    <th>Resident Name</th>
                                    <th>Age</th>
                                    <th>Sex</th>
                                    <th>Classification</th>
                                    <th>Contact Info</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="editResidentModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h2>Edit Resident</h2>
            <form id="editResidentForm" class="auth-form" style="text-align: left;">
                <input type="hidden" id="edit-doc-id">
                
                <div style="display: flex; gap: 1rem; margin-bottom: 0.5rem;">
                    <div style="flex:1;">
                        <label class="modal-label" for="edit-firstname">First Name</label>
                        <input type="text" id="edit-firstname" class="modal-select" required>
                    </div>
                    <div style="flex:1;">
                        <label class="modal-label" for="edit-surname">Surname</label>
                        <input type="text" id="edit-surname" class="modal-select" required>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-bottom: 0.5rem;">
                    <div style="flex:1;">
                        <label class="modal-label" for="edit-age">Age</label>
                        <input type="number" id="edit-age" class="modal-select" required>
                    </div>
                    <div style="flex:1;">
                        <label class="modal-label" for="edit-sex">Sex</label>
                        <select id="edit-sex" class="modal-select" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>

                <label class="modal-label" for="edit-contact">Contact Number</label>
                <input type="text" id="edit-contact" class="modal-select">

                <label class="modal-label" for="edit-classification">Classification</label>
                <select id="edit-classification" class="modal-select" required>
                    <option value="Infant">Infant</option>
                    <option value="Kids">Kids</option>
                    <option value="Teenagers">Teenagers</option>
                    <option value="Adults">Adults</option>
                    <option value="Senior Citizens">Senior Citizens</option>
                    <option value="PWDs">PWDs</option>
                </select>

                <div class="modal-actions" style="margin-top: 1rem;">
                    <button type="submit" class="btn btn--approve" id="saveEditBtn">Save Changes</button>
                    <button type="button" class="btn btn--cancel" onclick="closeEditModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth-guard.js"></script>
    
    <script src="residents-logic.js"></script>
</body>
</html>
