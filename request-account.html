<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Inquiry | Barangay 86ers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="86ERS%20LOGO.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="inquiry-body">
    <main class="inquiry" role="region" aria-label="Account Inquiry">
        <h1>Account Inquiry:</h1>

        <section class="inquiry-card">
            <img class="inquiry-card__badge" src="86ERS%20LOGO.png" alt="Barangay 86ers logo">

            <!-- Concern toggle -->
            <div class="concern" id="concernToggle">
                <span class="concern__label">Concern:</span>
                <div class="concern__actions">
                    <button class="pill pill--active" data-target="createForm" type="button">Request Account Creation</button>
                    <button class="pill" data-target="retrieveForm" type="button">Request Account Retrieval</button>
                </div>
            </div>

            <hr class="divider">

            <!-- Request Account Creation form -->
            <form id="createForm" class="inquiry-form is-active" autocomplete="off">
                <div class="field">
                    <label for="create-fname">First Name:</label>
                    <input id="create-fname" name="firstName" type="text" placeholder="Juan" required>
                </div>
                <div class="field">
                    <label for="create-suffix">Suffix (if any):</label>
                    <input id="create-suffix" name="suffix" type="text" placeholder="Sr. / Jr.">
                </div>
                <div class="field">
                    <label for="create-lname">Last Name:</label>
                    <input id="create-lname" name="lastName" type="text" placeholder="Dela Cruz" required>
                </div>
                <div class="field">
                    <label for="create-sex">Sex:</label>
                    <select id="create-sex" name="sex" required>
                        <option value="Male" selected>Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="field field--full">
                    <label for="create-email">E-mail address:</label>
                    <input id="create-email" name="email" type="email" placeholder="juandelacruz@yahoo.com" required>
                </div>
                <div class="field field--full">
                    <label for="create-id">Barangay ID:</label>
                    <div class="file-upload" id="fileUploadZone">
                        <input id="create-id" name="barangayId" type="file" accept="image/*,.pdf" required class="file-upload__input">
                        <div class="file-upload__placeholder" id="filePlaceholder">
                            <span class="file-upload__icon">&#128196;</span>
                            <span class="file-upload__text">Click or drag to upload your Barangay ID</span>
                            <span class="file-upload__hint">JPG, PNG, or PDF (max 5MB)</span>
                        </div>
                        <div class="file-upload__preview" id="filePreview" style="display:none;">
                            <img id="previewImg" alt="ID Preview">
                            <span class="file-upload__filename" id="fileName"></span>
                            <button type="button" class="file-upload__remove" id="removeFile">&times;</button>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="submit-btn" type="submit" id="createBtn">Send Request</button>
                </div>
            </form>

            <!-- Request Account Retrieval form -->
            <form id="retrieveForm" class="inquiry-form" autocomplete="off">
                <div class="field">
                    <label for="retrieve-email">Registered E-mail address:</label>
                    <input id="retrieve-email" name="email" type="email" placeholder="juandelacruz@yahoo.com" required>
                </div>
                <div class="field">
                    <label for="retrieve-role">Role:</label>
                    <select id="retrieve-role" name="role" required>
                        <option value="Staff" selected>Staff</option>
                        <option value="BHW">BHW</option>
                    </select>
                </div>
                <div class="field field--full">
                    <label for="retrieve-name">Registered Full Name:</label>
                    <input id="retrieve-name" name="fullName" type="text" placeholder="Juan Dela Cruz" required>
                </div>
                <div class="form-actions">
                    <button class="submit-btn" type="submit" id="retrieveBtn">Send Request</button>
                </div>
            </form>

            <!-- Success / Error messages -->
            <div id="successMsg" class="auth-message auth-message--success" style="display:none;">
                <strong>Request submitted!</strong><br>
                Please wait for an administrator to review your request.
                <div style="margin-top: 1rem;">
                    <a href="index.html" class="submit-btn" style="display:inline-block;text-decoration:none;padding:0.6rem 2rem;font-size:0.9rem;">Back to Main Page</a>
                </div>
            </div>
            <div id="errorMsg" class="auth-message auth-message--error" style="display:none;"></div>
        </section>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        /* ── Tab switching ── */
        const pills = document.querySelectorAll('.pill');
        const forms = document.querySelectorAll('.inquiry-form');

        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pills.forEach(p => p.classList.remove('pill--active'));
                pill.classList.add('pill--active');
                forms.forEach(f => f.classList.remove('is-active'));
                document.getElementById(pill.dataset.target).classList.add('is-active');
                successMsg.style.display = 'none';
                errorMsg.style.display = 'none';
            });
        });

        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');

        /* ── Compress image to base64 ── */
        function compressImage(file, maxDim = 1200, quality = 0.6) {
            return new Promise((resolve, reject) => {
                if (!file.type.startsWith('image/')) {
                    // For non-image files (PDF), read as-is
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () => reject(new Error('Failed to read file.'));
                    reader.readAsDataURL(file);
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > maxDim || h > maxDim) {
                            if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
                            else        { w = Math.round(w * maxDim / h); h = maxDim; }
                        }
                        canvas.width = w;
                        canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = () => reject(new Error('Failed to load image.'));
                    img.src = ev.target.result;
                };
                reader.onerror = () => reject(new Error('Failed to read file.'));
                reader.readAsDataURL(file);
            });
        }

        /* ── File upload preview ── */
        const fileInput = document.getElementById('create-id');
        const filePlaceholder = document.getElementById('filePlaceholder');
        const filePreview = document.getElementById('filePreview');
        const previewImg = document.getElementById('previewImg');
        const fileNameEl = document.getElementById('fileName');
        const removeFileBtn = document.getElementById('removeFile');
        const fileUploadZone = document.getElementById('fileUploadZone');

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) {
                errorMsg.textContent = 'File size must be under 5MB.';
                errorMsg.style.display = 'block';
                fileInput.value = '';
                return;
            }
            fileNameEl.textContent = file.name;
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewImg.src = ev.target.result;
                    previewImg.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                previewImg.style.display = 'none';
            }
            filePlaceholder.style.display = 'none';
            filePreview.style.display = 'flex';
        });

        removeFileBtn.addEventListener('click', () => {
            fileInput.value = '';
            filePlaceholder.style.display = 'flex';
            filePreview.style.display = 'none';
            previewImg.src = '';
        });

        // Drag & drop
        fileUploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUploadZone.classList.add('file-upload--dragover');
        });
        fileUploadZone.addEventListener('dragleave', () => {
            fileUploadZone.classList.remove('file-upload--dragover');
        });
        fileUploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUploadZone.classList.remove('file-upload--dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                fileInput.dispatchEvent(new Event('change'));
            }
        });

        /* ── Account Creation request ── */
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';
            errorMsg.style.display = 'none';

            const form = e.target;
            const firstName = form.firstName.value.trim();
            const lastName = form.lastName.value.trim();
            const suffix = form.suffix.value.trim();
            const sex = form.sex.value;
            const email = form.email.value.trim().toLowerCase();
            const fullName = suffix ? `${firstName} ${lastName} ${suffix}` : `${firstName} ${lastName}`;
            const idFile = fileInput.files[0];

            if (!idFile) {
                errorMsg.textContent = 'Please upload your Barangay ID.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Send Request';
                return;
            }

            try {
                const existing = await db.collection('accountRequests')
                    .where('email', '==', email)
                    .where('status', 'in', ['pending', 'approved'])
                    .get();

                if (!existing.empty) {
                    throw new Error('An account request with this email already exists.');
                }

                // Compress and encode Barangay ID
                btn.textContent = 'Processing ID...';
                const barangayIdData = await compressImage(idFile);

                // Check compressed size (Firestore doc limit ~1MB)
                if (barangayIdData.length > 900000) {
                    throw new Error('Image is too large even after compression. Please use a smaller or lower-resolution photo.');
                }

                btn.textContent = 'Sending...';
                await db.collection('accountRequests').add({
                    fullName,
                    firstName,
                    lastName,
                    suffix,
                    sex,
                    email,
                    barangayIdData,
                    type: 'creation',
                    status: 'pending',
                    assignedRole: null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                form.style.display = 'none';
                document.getElementById('concernToggle').style.display = 'none';
                successMsg.style.display = 'block';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Send Request';
            }
        });

        /* ── Account Retrieval request ── */
        document.getElementById('retrieveForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('retrieveBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';
            errorMsg.style.display = 'none';

            const form = e.target;
            const email = form.email.value.trim().toLowerCase();
            const role = form.role.value;
            const fullName = form.fullName.value.trim();

            try {
                const existing = await db.collection('accountRequests')
                    .where('email', '==', email)
                    .where('type', '==', 'retrieval')
                    .where('status', '==', 'pending')
                    .get();

                if (!existing.empty) {
                    throw new Error('A retrieval request for this email is already pending. Please wait for admin review.');
                }

                const userSnap = await db.collection('users')
                    .where('email', '==', email)
                    .limit(1)
                    .get();

                if (userSnap.empty) {
                    throw new Error('No registered account found with this email. If you need a new account, please use "Request Account Creation" instead.');
                }

                const userData = userSnap.docs[0].data();

                const normalizedInputRole = role.toLowerCase();
                const normalizedUserRole = (userData.role || '').toLowerCase();
                if (normalizedInputRole !== normalizedUserRole) {
                    throw new Error('The role you selected does not match the account on file. Please verify and try again.');
                }

                const normalizedInputName = fullName.toLowerCase().replace(/\s+/g, ' ');
                const normalizedUserName = (userData.fullName || '').toLowerCase().replace(/\s+/g, ' ');
                if (normalizedInputName !== normalizedUserName) {
                    throw new Error('The full name does not match the account on file. Please enter your registered full name exactly.');
                }

                await db.collection('accountRequests').add({
                    fullName,
                    email,
                    role: normalizedInputRole,
                    matchedUserId: userSnap.docs[0].id,
                    type: 'retrieval',
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                form.style.display = 'none';
                document.getElementById('concernToggle').style.display = 'none';
                successMsg.innerHTML = '<strong>Retrieval request submitted!</strong><br>An administrator will review your request and send a password reset to your email.<div style="margin-top: 1rem;"><a href="index.html" class="submit-btn" style="display:inline-block;text-decoration:none;padding:0.6rem 2rem;font-size:0.9rem;">Back to Main Page</a></div>';
                successMsg.style.display = 'block';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Send Request';
            }
        });
    </script>
</body>
</html>
