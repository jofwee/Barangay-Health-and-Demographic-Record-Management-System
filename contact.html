<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Inquiry | Barangay 86ers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="inquiry-body">
    <main class="inquiry" role="region" aria-label="Account Help">
        <h1>Account Help</h1>
        <section class="inquiry-card">
            <img class="inquiry-card__badge" src="86ERS%20LOGO.png" alt="Barangay 86ers logo">

            <div class="concern">
                <p class="concern__label">What do you need help with?</p>
                <div class="concern__actions" role="group" aria-label="Help type">
                    <button type="button" class="pill pill--active" data-target="retrieval">Account Retrieval</button>
                    <button type="button" class="pill" data-target="reset">Reset Password</button>
                </div>
            </div>
            <hr class="divider" aria-hidden="true">

            <!-- Account Retrieval -->
            <form class="inquiry-form is-active" data-form="retrieval" id="retrievalForm">
                <div class="field field--full">
                    <label for="registered-email">Registered E-mail address:</label>
                    <input id="registered-email" name="registered-email" type="email" placeholder="juandelacruz@yahoo.com" required>
                </div>
                <div class="field field--full">
                    <label for="registered-name">Registered Full Name:</label>
                    <input id="registered-name" name="registered-name" type="text" placeholder="Juan Dela Cruz" required>
                </div>
                <div class="form-actions">
                    <button class="submit-btn" type="submit">Send Retrieval Request</button>
                </div>
            </form>

            <!-- Reset Password -->
            <form class="inquiry-form" data-form="reset" id="resetForm">
                <div class="field field--full">
                    <label for="reset-email">Your E-mail address:</label>
                    <input id="reset-email" name="reset-email" type="email" placeholder="juandelacruz@yahoo.com" required>
                </div>
                <div class="form-actions">
                    <button class="submit-btn" type="submit">Send Password Reset</button>
                </div>
            </form>

            <div id="successMsg" class="auth-message auth-message--success" style="display:none;"></div>
            <div id="errorMsg" class="auth-message auth-message--error" style="display:none;"></div>

            <p class="auth-footer" style="text-align:center; margin-top:1.25rem;">
                Need a new account? <a href="request-account.html">Request Account</a><br>
                <a href="index.html">&larr; Back to Sign In</a>
            </p>
        </section>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        const pillButtons = document.querySelectorAll('[data-target]');
        const forms = document.querySelectorAll('[data-form]');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');

        // Tab switching
        pillButtons.forEach(button => {
            button.addEventListener('click', () => {
                pillButtons.forEach(btn => btn.classList.toggle('pill--active', btn === button));
                const target = button.dataset.target;
                forms.forEach(form => form.classList.toggle('is-active', form.dataset.form === target));
                successMsg.style.display = 'none';
                errorMsg.style.display = 'none';
            });
        });

        function showSuccess(msg) {
            successMsg.innerHTML = msg;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        // Account Retrieval - saves inquiry to Firestore
        document.getElementById('retrievalForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            const email = document.getElementById('registered-email').value.trim().toLowerCase();
            const fullName = document.getElementById('registered-name').value.trim();

            try {
                await db.collection('accountInquiries').add({
                    type: 'retrieval',
                    email: email,
                    fullName: fullName,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showSuccess('<strong>Request sent!</strong> An administrator will review your retrieval request and get back to you via email.');
                e.target.reset();
            } catch (err) {
                showError('Failed to send request. Please try again.');
            }
            btn.disabled = false;
            btn.textContent = 'Send Retrieval Request';
        });

        // Password Reset - uses Firebase Auth
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            const email = document.getElementById('reset-email').value.trim().toLowerCase();

            try {
                await auth.sendPasswordResetEmail(email);
                showSuccess('<strong>Reset email sent!</strong> Check your inbox (and spam folder) for a password reset link.');
                e.target.reset();
            } catch (err) {
                const map = {
                    'auth/user-not-found': 'No account found with that email address.',
                    'auth/invalid-email': 'Please enter a valid email address.',
                    'auth/too-many-requests': 'Too many attempts. Please try again later.'
                };
                showError(map[err.code] || 'Failed to send reset email. Please try again.');
            }
            btn.disabled = false;
            btn.textContent = 'Send Password Reset';
        });
    </script>
</body>
</html>
